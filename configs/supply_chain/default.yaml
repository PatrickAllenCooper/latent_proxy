supply_chain:
  n_periods: 60
  initial_budget: 500000.0
  channel_correlation: 0.20

  regime_transition_matrix:
    - [0.75, 0.15, 0.10]
    - [0.20, 0.60, 0.20]
    - [0.15, 0.15, 0.70]

  quality_floor:
    min_suppliers: 2
    max_single_supplier_share: 0.70
    resilience_mc_samples: 5000
    resilience_threshold: -0.40
    max_disruption_prob: 0.10

  suppliers:
    - name: premium_domestic
      sector: domestic
      cost_per_unit: 0.03
      delivery_variance: 0.02
      reliability_rating: 0.98
      regime_sensitivity: 0.1
      correlation_sign: 1.0
    - name: standard_domestic
      sector: domestic
      cost_per_unit: 0.06
      delivery_variance: 0.05
      reliability_rating: 0.92
      regime_sensitivity: 0.5
      correlation_sign: 1.0
    - name: overseas_budget
      sector: international
      cost_per_unit: 0.12
      delivery_variance: 0.12
      reliability_rating: 0.78
      regime_sensitivity: 1.0
      correlation_sign: 1.0
    - name: specialty_niche
      sector: specialty
      cost_per_unit: 0.08
      delivery_variance: 0.10
      reliability_rating: 0.85
      regime_sensitivity: 0.8
      correlation_sign: -0.3
    - name: spot_market
      sector: commodities
      cost_per_unit: 0.10
      delivery_variance: 0.18
      reliability_rating: 0.70
      regime_sensitivity: 1.3
      correlation_sign: 0.5
